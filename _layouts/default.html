<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title | default: site.title }}</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
        Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      margin: 2rem auto;
      max-width: 700px;
      background-color: #f0f8f5;
      color: #213f35;
      padding: 1rem;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgb(50 50 60 / 0.1);
    }
    a {
      color: #2b7a4b;
      text-decoration: none;
      font-weight: 600;
    }
    a:hover {
      text-decoration: underline;
    }
    h1, h2, h3, h4 {
      color: #205725;
    }
    pre {
      background-color: #d7ece5;
      padding: 1em;
      overflow-x: auto;
      border-radius: 5px;
    }
    .profile {
      text-align: center;
      margin-bottom: 2rem;
    }
    .profile img {
      border-radius: 50%;
      width: 150px;
      height: 150px;
      object-fit: cover;
      border: 3px solid #2b7a4b;
    }
  </style>
</head>
<body>
  <div class="profile">
    <img src="/assets/profile.jpg" alt="Sadra Sadraddini" />
    <h1>{{ page.title | default: site.title }}</h1>
  </div>
  <article>
    {{ content }}
  </article>
</body>
</html>
